<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws & Hearts - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Paws & Hearts</div>
        <div class="links">
            <a href="index.html" class="active">Dashboard</a>
            <a href="addpet.html">+ Add Pet</a>
        </div>
    </nav>

    <main>
        <header>
            <h1>Dashboard</h1>
            <p>Welcome to Paws & Hearts Adoption Center</p>
        </header>

        <section class="stats-container">
            <div class="stat-card">
                <h3>Total Pets</h3>
                <p id="totalCount">0</p>
            </div>
        </section>

        <section class="table-section">
            <div class="table-header">
                <h2>Recent Pets</h2>
                <button class="btn-orange" onclick="location.href='addpet.html'">+ Add New Pet</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Breed</th>
                        <th>Age</th>
                        <th>Description</th>
                        <th style="text-align: center;">Actions</th>
                    </tr>
                </thead>
                <tbody id="petsTableBody"></tbody> 
            </table>
        </section>
    </main>

    <div id="editModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h2>Edit Pet</h2>
            <input type="hidden" id="editIndex">
            <div class="form-group"><label>Pet Name</label><input type="text" id="editName"></div>
            <div class="form-group"><label>Type</label><input type="text" id="editType"></div>
            <div class="form-group"><label>Breed</label><input type="text" id="editBreed"></div>
            <div class="form-group"><label>Age</label><input type="number" id="editAge"></div>
            <div class="form-group"><label>Description</label><textarea id="editDesc" rows="3"></textarea></div>
            <div class="modal-actions">
                <button id="saveBtn" class="btn-orange">Update Details</button>
                <button id="cancelBtn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
